spring.application.name=notificationservice

spring.datasource.url=jdbc:mysql://localhost:3306/notificationdb
spring.datasource.username=root
spring.datasource.password=Shahnawaaz@10
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true    
spring.session.jdbc.initialize-schema=always


spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest  

# Email delivery through SMTP providers such as Mailtrap.
spring.mail.host=${MAIL_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
notification.email.from=${MAIL_FROM:no-reply@notification.local}
notification.email.default-subject=${MAIL_DEFAULT_SUBJECT:Notification}

# SMS and WhatsApp delivery through Twilio.
notification.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
notification.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
notification.twilio.sms-from=${TWILIO_SMS_FROM:}
notification.twilio.whatsapp-from=${TWILIO_WHATSAPP_FROM:}

# Instagram is intentionally disabled until Meta app approval and recipient ids are ready.
notification.instagram.enabled=${INSTAGRAM_ENABLED:false}
notification.instagram.access-token=${INSTAGRAM_ACCESS_TOKEN:}
notification.instagram.sender-id=${INSTAGRAM_SENDER_ID:}
notification.instagram.graph-api-base-url=${INSTAGRAM_GRAPH_API_BASE_URL:https://graph.facebook.com/v20.0}
